<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<!-- FONTS — wire up the brand's fonts during setup. Two common cases: -->
<!-- 1) Google Fonts: uncomment and set the family.
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=YOUR+FONT&display=swap" rel="stylesheet" />
-->

<style>
  /* 2) Local fonts: drop the files in ./fonts/ and declare them here.
  @font-face { font-family: BrandSans; font-weight: 400; font-display: block; src: url("fonts/Brand-Regular.otf") format("opentype"); }
  @font-face { font-family: BrandSans; font-weight: 700; font-display: block; src: url("fonts/Brand-Bold.otf") format("opentype"); }
  */

  /* BRAND TOKENS — fill these in during setup. Defaults below are neutral placeholders. */
  :root {
    --bg: #ffffff;          /* card background */
    --surface: #ffffff;     /* inner panels/cards */
    --text: #14181f;        /* primary text */
    --text-soft: #5b6472;   /* secondary text */
    --accent: #2f6df0;      /* the one accent color */
    --accent-dark: #1f4fb8; /* accent for small text on light bg */
    --border: rgba(20,24,31,0.10);
    --faint: rgba(20,24,31,0.05);

    --font-heading: 'BrandSans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    --font-accent: Georgia, 'Times New Roman', serif; /* for the italic subhead */
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e8e8;
    font-family: var(--font-heading);
    -webkit-font-smoothing: antialiased;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 40px;
  }

  /* Fixed card size = the rendered image size (before 2x). 16:9. */
  #card {
    width: 1280px; height: 720px;
    background: var(--bg);
    color: var(--text);
    position: relative;
    padding: 68px 76px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* optional warm/cool corner wash for depth — recolor or delete */
  #card::after {
    content: "";
    position: absolute; top: -180px; right: -180px;
    width: 520px; height: 520px; border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--accent) 20%, transparent), transparent 70%);
  }

  h1 {
    font-family: var(--font-heading);
    font-weight: 700; font-size: 56px; line-height: 1.08;
    letter-spacing: -0.8px; color: var(--text); max-width: 980px;
  }
  h1 .accent { color: var(--accent-dark); }

  .subhead {
    font-family: var(--font-accent);
    font-style: italic; font-size: 25px; color: var(--text-soft);
    margin-top: 16px;
  }

  /* ── EXAMPLE VISUAL: a "before → after" pair. Replace per post. ── */
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; gap: 40px; margin-top: 14px; }

  .panel {
    width: 392px; height: 326px;
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 22px 50px -28px rgba(0,0,0,0.30);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .panel .bar { height: 4px; flex-shrink: 0; background: var(--border); }
  .panel.accent .bar { background: var(--accent); }
  .panel .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.8px; color: var(--text-soft); padding: 18px 22px 14px; }
  .panel .body { padding: 0 22px 22px; flex: 1; }
  .ln { height: 9px; border-radius: 4px; background: var(--faint); margin-bottom: 13px; }
  .ln.s { width: 60%; } .ln.m { width: 85%; } .ln.l { width: 100%; }
  .ln.hot { background: color-mix(in srgb, var(--accent) 30%, transparent); }

  .arrow { display: flex; flex-direction: column; align-items: center; gap: 9px; flex-shrink: 0; }
  .arrow .circle { width: 54px; height: 54px; border-radius: 50%; background: var(--text); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .arrow .time { font-family: var(--font-accent); font-style: italic; font-size: 15px; color: var(--accent-dark); }
</style>
</head>
<body>
  <div id="card">
    <!-- HEADLINE: short, two lines max. Accent the one key phrase. -->
    <h1>Your headline goes here,<br/><span class="accent">key phrase</span> in accent</h1>
    <div class="subhead">&mdash; optional one-line subhead</div>

    <!-- VISUAL: replace this example with something that illustrates the post. -->
    <div class="stage">
      <div class="panel">
        <div class="bar"></div>
        <div class="label">Before</div>
        <div class="body">
          <div class="ln l"></div><div class="ln m"></div><div class="ln s"></div>
          <div class="ln l"></div><div class="ln m"></div>
        </div>
      </div>
      <div class="arrow"><div class="circle">&rarr;</div><div class="time">~2 min</div></div>
      <div class="panel accent">
        <div class="bar"></div>
        <div class="label">After</div>
        <div class="body">
          <div class="ln l"></div><div class="ln hot s"></div>
          <div class="ln m"></div><div class="ln l"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
